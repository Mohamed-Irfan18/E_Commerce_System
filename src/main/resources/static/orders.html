<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders - ShopHub</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="topBar"></div>
  <nav id="navbar"></nav>

  <div class="page-banner">
    <h1>📦 My Orders</h1>
    <p>Track and manage your order history</p>
  </div>

  <div class="container page-content">
    <div id="alertBox"></div>
    <div id="ordersArea" class="loading">Loading orders...</div>
  </div>

  <div id="footer"></div>

  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script>
    initLayout();
    renderNavbar('orders');
    requireAuth();

    async function loadOrders() {
      const area = document.getElementById('ordersArea');

      try {
        const orders = await api('/api/orders');

        if (!orders.length) {
          area.innerHTML = `
            <div class="empty-state">
              <div class="empty-icon">📦</div>
              <h3>No orders yet</h3>
              <p>When you place an order, it will appear here.</p>
              <a href="index.html" class="btn btn-accent">Start Shopping</a>
            </div>`;
          return;
        }

        area.innerHTML = orders.map(order => `
          <div class="order-card">
            <div class="order-header">
              <div>
                <strong style="font-size:1.05rem">Order #${order.id}</strong>
                <div style="color:var(--text-muted);font-size:0.85rem;margin-top:0.25rem">
                  🗓 ${new Date(order.createdAt).toLocaleString()}
                </div>
              </div>
              <span class="status ${order.status}">${order.status}</span>
            </div>
            <p style="font-size:0.9rem;color:var(--text-muted);margin-bottom:1rem;padding:0.75rem 1rem;background:var(--surface2);border-radius:8px">
              📍 ${order.shippingAddress}
            </p>
            <div class="table-wrap">
              <table>
                <thead><tr><th>Product</th><th>Qty</th><th>Unit Price</th><th>Subtotal</th></tr></thead>
                <tbody>
                  ${order.items.map(item => `
                    <tr>
                      <td>
                        <div class="cart-product-cell">
                          <img src="${getProductImage({ name: item.productName, imageUrl: '' })}" alt="">
                          ${item.productName}
                        </div>
                      </td>
                      <td>${item.quantity}</td>
                      <td>${formatPrice(item.unitPrice)}</td>
                      <td><strong>${formatPrice(item.subtotal)}</strong></td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
            <div style="text-align:right;margin-top:1rem;font-size:1.2rem;font-weight:800">
              Total: <span style="color:var(--primary)">${formatPrice(order.totalAmount)}</span>
            </div>
          </div>
        `).join('');
      } catch (err) {
        area.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
      }
    }

    loadOrders();
  </script>
</body>
</html>
